<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顾问现场作战系统</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css?v=20260505d">
  <link rel="stylesheet" href="/static/css/demo-mode.css?v=20260503">
</head>
<body>
  <!-- 跳转到主内容链接（无障碍） -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>

  <div id="app">
    <!-- 顶部导航 -->
    <header class="header">
      <h1>顾问现场作战系统</h1>
      <div class="header-controls">
        <!-- 飞书连接状态指示器 -->
        <div class="feishu-status" id="feishu-status" title="飞书连接状态">
          <span class="status-dot status-dot-disconnected" id="feishu-dot"></span>
          <span class="status-text" id="feishu-text">检测中...</span>
        </div>
        <!-- 演示模式状态徽标（设计文档 5.2 节） -->
        <div class="mode-badge" id="mode-badge" title="工作模式">
          <span class="mode-dot mode-dot-work"></span>
        </div>
        <div class="llm-selector">
          <label for="llm-provider">LLM:</label>
          <select id="llm-provider" aria-label="选择 LLM 提供商">
            <option value="deepseek-free">DeepSeek Free</option>
            <option value="volc-ark">火山引擎 Ark</option>
            <option value="deepseek">DeepSeek 官方</option>
          </select>
          <label for="llm-model" class="visually-hidden">模型</label>
          <select id="llm-model" class="model-select" aria-label="选择模型"></select>
        </div>
        <div class="session-info">
          <span id="session-id" aria-live="polite">未创建会话</span>
          <select id="session-select" class="session-select" aria-label="选择会话" style="display: none;">
            <option value="">选择会话...</option>
          </select>
          <button id="new-session-btn" class="btn btn-primary">新建会话</button>
        </div>
      </div>
    </header>

    <!-- 主内容区：三栏布局 3:5:2 -->
    <main id="main-content" class="main layout-container">
      <!-- 左栏(30%)：诊断进度状态板 - 弹性上下分屏 -->
      <section class="col-left panel status-panel" aria-labelledby="status-heading">
        <!-- 固定区：诊断进度 -->
        <div class="left-fixed">
          <h2 id="status-heading">诊断进度 <span id="completeness-value-small">0%</span></h2>
          <!-- 完整度进度条 -->
          <div class="progress-bar">
            <div class="progress-fill" id="completeness-progress" style="width: 0%"></div>
          </div>
          <!-- 诊断进度标签网格 (3×3) -->
          <div class="progress-grid" id="progress-grid">
            <div class="progress-tag empty" data-field="产品线" data-status="empty">产品线</div>
            <div class="progress-tag empty" data-field="客户群体" data-status="empty">客户群体</div>
            <div class="progress-tag empty" data-field="收入结构" data-status="empty">收入结构</div>
            <div class="progress-tag empty" data-field="毛利结构" data-status="empty">毛利结构</div>
            <div class="progress-tag empty" data-field="交付情况" data-status="empty">交付情况</div>
            <div class="progress-tag empty" data-field="资源分布" data-status="empty">资源分布</div>
            <div class="progress-tag empty" data-field="战略目标" data-status="empty">战略目标</div>
            <div class="progress-tag empty" data-field="显性诉求" data-status="empty">显性诉求</div>
            <div class="progress-tag empty" data-field="隐性痛点" data-status="empty">隐性痛点</div>
          </div>
        </div>

        <!-- 弹性区A：已记事实（可滚动） -->
        <div class="left-flex-a">
          <h3 class="section-title">已记事实 <span class="count" id="fact-count">(0)</span></h3>
          <div class="fact-list" id="fact-list" role="list" aria-label="已记事实列表">
            <div class="empty-state">暂无事实记录</div>
          </div>
        </div>

        <!-- 弹性区B：核心共识（可滚动） -->
        <div class="left-flex-b">
          <h3 class="section-title">核心共识 <span class="count" id="consensus-count">(0)</span></h3>
          <div class="consensus-list" id="consensus-list" role="list" aria-label="核心共识列表">
            <div class="empty-state">暂无共识记录</div>
          </div>
        </div>
      </section>

      <!-- 中栏(50%)：主对话区 -->
      <section class="col-mid panel dialog-panel" aria-labelledby="dialog-heading">
        <h2 id="dialog-heading" class="visually-hidden">对话区</h2>
        <div class="panel-content">
          <!-- 阶段指示 Banner -->
          <div class="stage-banner" id="stage-banner">
            <span class="stage-dot">●</span>
            <span class="stage-text">当前阶段: <strong id="stage-display">战略梳理</strong></span>
          </div>

          <!-- 共识链显示区 -->
          <div class="consensus-chain" id="consensus-chain" role="list" aria-label="共识链">
            <div class="empty-state">暂无记录，使用下方指令添加</div>
          </div>

          <!-- 快捷指令区 -->
          <div class="command-section">
            <h3>快捷指令</h3>
            <div class="command-input-group">
              <input type="text" id="command-input" placeholder="输入指令（如：/记、/确认、/切、/候选、/案例）" aria-label="指令输入">
              <button id="execute-command-btn" class="btn btn-primary">执行</button>
            </div>

            <!-- 常用指令按钮 -->
            <div class="quick-commands">
              <!-- Stage 2.2: 类型切换按钮 -->
              <button id="type-toggle-btn" class="btn btn-sm btn-type-fact" title="切换记录类型">事实</button>
              <button id="cmd-candidate" class="btn btn-secondary cmd-btn">
                <span class="cmd-badge" id="candidate-badge"></span>/候选
              </button>
              <button id="cmd-confirm" class="btn btn-secondary cmd-btn">/确认</button>
              <button id="cmd-switch" class="btn btn-secondary cmd-btn">/切</button>
              <button id="cmd-case" class="btn btn-secondary cmd-btn">/案例</button>
            </div>
          </div>

          <!-- 候选方案弹出区（设计规范 3.5 节：主对话区内弹出，其他内容半透明化） -->
          <div class="candidates-overlay" id="candidates-overlay" style="display: none;">
            <div class="candidates-header">
              <h3>这是基于已确认的事实生成的方案，请选择最贴合客户局势的方向</h3>
              <button class="close-overlay-btn" id="close-candidates-btn" aria-label="关闭候选">×按 Esc 关闭</button>
            </div>
            <div class="candidates-cards" id="candidates-cards"></div>
            <p class="candidates-hint">按数字键 1/2/3 快速选择，或 Esc 关闭</p>
          </div>
        </div>
      </section>

      <!-- 右栏(20%)：追问建议卡 -->
      <section class="col-right panel suggestion-panel" aria-labelledby="suggestion-heading">
        <h2 id="suggestion-heading" class="visually-hidden">建议</h2>
        <div class="panel-content">
          <!-- 状态切换提示 -->
          <div class="suggestion-status" id="suggestion-status">
            <div class="status-info">追问建议模式</div>
          </div>

          <!-- 当前追问建议 -->
          <div class="current-suggestion" id="current-suggestion">
            <p class="suggestion-question" id="suggestion-question">点击"新建会话"开始诊断</p>
            <div class="suggestion-actions">
              <button id="use-suggestion-btn" class="btn btn-primary btn-sm">用这个问题</button>
              <button id="skip-suggestion-btn" class="btn btn-secondary btn-sm">跳过,下一个</button>
              <button id="custom-question-btn" class="btn btn-secondary btn-sm">我来写</button>
            </div>
          </div>

          <!-- 备弹区（SKU卡片） -->
          <div class="sku-section">
            <div class="sku-header">
              <span class="sku-title">备弹区</span>
              <span class="new-sku-badge" id="new-sku-badge" style="display: none;">🔴 有新备弹</span>
            </div>
            <div class="sku-list" id="sku-list" role="list" aria-label="知识备弹">
              <div class="empty-state">暂无备弹</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部：文档生成 -->
    <footer class="footer">
      <div class="actions">
        <button id="generate-memo-btn" class="btn btn-primary">生成备忘录</button>
        <button id="generate-battle-card-btn" class="btn btn-primary">生成作战卡</button>
        <button id="export-btn" class="btn btn-secondary">导出会话</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button id="import-btn" class="btn btn-secondary">导入会话</button>
      </div>
      <div id="status-bar" class="status-bar">就绪 - 点击"新建会话"开始</div>
    </footer>

    <!-- 右下角悬浮徽标：待决策候选（设计文档 3.5 节） -->
    <div id="pending-decision-badge" class="pending-decision-badge" style="display: none;" title="点击展开候选">
      <span class="badge-icon">⏳</span>
      <span class="badge-count" id="pending-candidate-count">0</span>
    </div>
  </div>

  <script src="/static/js/demo-mode.js?v=20260503"></script>
  <script src="/static/js/app.js?v=20260504f"></script>
</body>
</html>
