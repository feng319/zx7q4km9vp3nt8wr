<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顾问现场作战系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/demo-mode.css">
</head>
<body>
  <!-- 跳转到主内容链接（无障碍） -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>

  <div id="app">
    <!-- 顶部导航 -->
    <header class="header">
      <h1>顾问现场作战系统</h1>
      <div class="header-controls">
        <!-- 演示模式状态徽标（设计文档 5.2 节） -->
        <div class="mode-badge" id="mode-badge" title="工作模式">
          <span class="mode-dot mode-dot-work"></span>
        </div>
        <div class="llm-selector">
          <label for="llm-provider">LLM:</label>
          <select id="llm-provider" aria-label="选择 LLM 提供商">
            <option value="deepseek-free">DeepSeek Free</option>
            <option value="volc-ark">火山引擎 Ark</option>
            <option value="deepseek">DeepSeek 官方</option>
          </select>
          <label for="llm-model" class="visually-hidden">模型</label>
          <select id="llm-model" class="model-select" aria-label="选择模型"></select>
        </div>
        <div class="session-info">
          <span id="session-id" aria-live="polite">未创建会话</span>
          <button id="new-session-btn" class="btn btn-primary">新建会话</button>
        </div>
      </div>
    </header>

    <!-- 主内容区：三栏布局 3:5:2 -->
    <main id="main-content" class="main">
      <!-- 左栏(3)：诊断进度状态板 -->
      <section class="panel status-panel" aria-labelledby="status-heading">
        <h2 id="status-heading">诊断进度</h2>
        <div class="panel-content">
          <!-- 完整度进度条 -->
          <div class="completeness-section">
            <div class="progress-bar">
              <div class="progress-fill" id="completeness-progress" style="width: 0%"></div>
            </div>
            <p class="progress-label">完整度: <span id="completeness-value">0%</span></p>
          </div>

          <!-- 字段状态列表 -->
          <div class="fields-status" id="fields-status">
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">产品线</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">客户群体</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">收入结构</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">毛利结构</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">交付情况</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">资源分布</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">战略目标</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">显性诉求</span>
            </div>
            <div class="field-item status-empty">
              <span class="field-icon">○</span>
              <span class="field-name">隐性痛点</span>
            </div>
          </div>

          <!-- 当前阶段 -->
          <div class="current-stage">
            <p class="stage-label">当前阶段</p>
            <p class="stage-value" id="current-stage">战略梳理</p>
          </div>
        </div>
      </section>

      <!-- 中栏(5)：主对话区 -->
      <section class="panel dialog-panel" aria-labelledby="dialog-heading">
        <h2 id="dialog-heading">对话区</h2>
        <div class="panel-content">
          <!-- 阶段指示 -->
          <p class="stage-indicator">当前阶段: <strong id="stage-display">战略梳理</strong></p>

          <!-- 共识链显示区 -->
          <div class="consensus-chain" id="consensus-chain" role="list" aria-label="共识链">
            <div class="empty-state">暂无记录，使用下方指令添加</div>
          </div>

          <!-- 快捷指令区 -->
          <div class="command-section">
            <h3>快捷指令</h3>
            <div class="command-input-group">
              <input type="text" id="command-input" placeholder="输入指令（如：/记、/确认、/切、/候选、/案例）" aria-label="指令输入">
              <button id="execute-command-btn" class="btn btn-primary">执行</button>
            </div>

            <!-- 常用指令按钮 -->
            <div class="quick-commands">
              <button id="cmd-candidate" class="btn btn-secondary cmd-btn">
                <span class="cmd-badge" id="candidate-badge"></span>/候选
              </button>
              <button id="cmd-confirm" class="btn btn-secondary cmd-btn">/确认</button>
              <button id="cmd-switch" class="btn btn-secondary cmd-btn">/切</button>
              <button id="cmd-case" class="btn btn-secondary cmd-btn">/案例</button>
            </div>
          </div>

          <!-- 候选方案弹出区（设计规范 3.5 节：主对话区内弹出，其他内容半透明化） -->
          <div class="candidates-overlay" id="candidates-overlay" style="display: none;">
            <div class="candidates-header">
              <h3>这是基于已确认的事实生成的方案，请选择最贴合客户局势的方向</h3>
              <button class="close-overlay-btn" id="close-candidates-btn" aria-label="关闭候选">×按 Esc 关闭</button>
            </div>
            <div class="candidates-cards" id="candidates-cards"></div>
            <p class="candidates-hint">按数字键 1/2/3 快速选择，或 Esc 关闭</p>
          </div>
        </div>
      </section>

      <!-- 右栏(2)：追问建议卡 -->
      <section class="panel suggestion-panel" aria-labelledby="suggestion-heading">
        <h2 id="suggestion-heading">建议</h2>
        <div class="panel-content">
          <!-- 状态切换提示 -->
          <div class="suggestion-status" id="suggestion-status">
            <div class="status-info">追问建议模式</div>
          </div>

          <!-- 当前追问建议 -->
          <div class="current-suggestion" id="current-suggestion">
            <p class="suggestion-question" id="suggestion-question">点击"新建会话"开始诊断</p>
            <div class="suggestion-actions">
              <button id="use-suggestion-btn" class="btn btn-primary btn-sm">用这个问题</button>
              <button id="skip-suggestion-btn" class="btn btn-secondary btn-sm">跳过,下一个</button>
              <button id="custom-question-btn" class="btn btn-secondary btn-sm">我来写</button>
            </div>
          </div>

          <!-- 备弹区（SKU卡片） -->
          <div class="sku-section">
            <div class="sku-header">
              <span class="sku-title">备弹区</span>
              <span class="new-sku-badge" id="new-sku-badge" style="display: none;">🔴 有新备弹</span>
            </div>
            <div class="sku-list" id="sku-list" role="list" aria-label="知识备弹">
              <div class="empty-state">暂无备弹</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部：文档生成 -->
    <footer class="footer">
      <div class="actions">
        <button id="generate-memo-btn" class="btn btn-primary">生成备忘录</button>
        <button id="generate-battle-card-btn" class="btn btn-primary">生成作战卡</button>
        <button id="export-btn" class="btn btn-secondary">导出会话</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button id="import-btn" class="btn btn-secondary">导入会话</button>
      </div>
      <div id="status-bar" class="status-bar">就绪 - 点击"新建会话"开始</div>
    </footer>
  </div>

  <script src="/js/demo-mode.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
