<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顾问现场作战系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/demo-mode.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header class="header">
      <h1>顾问现场作战系统</h1>
      <div class="session-info">
        <span id="session-id">未创建会话</span>
        <button id="new-session-btn" class="btn btn-primary">新建会话</button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 左侧：共识链 -->
      <section class="panel consensus-panel">
        <h2>共识链</h2>
        <div class="panel-content">
          <div class="input-group">
            <select id="record-type">
              <option value="fact">事实</option>
              <option value="consensus">判断</option>
            </select>
            <select id="record-stage">
              <option value="战略梳理">战略梳理</option>
              <option value="商业模式">商业模式</option>
              <option value="行业演示">行业演示</option>
            </select>
          </div>
          <textarea id="record-content" placeholder="输入内容..."></textarea>
          <div class="input-group">
            <input type="text" id="record-source" placeholder="来源（可选）">
            <button id="add-record-btn" class="btn btn-primary">添加记录</button>
          </div>
          <div id="records-list" class="records-list"></div>
        </div>
      </section>

      <!-- 中间：候选方案 -->
      <section class="panel candidates-panel">
        <h2>候选方案</h2>
        <div class="panel-content">
          <button id="get-candidates-btn" class="btn btn-secondary">生成候选方案</button>
          <div id="candidates-list" class="candidates-list"></div>
        </div>
      </section>

      <!-- 右侧：知识召回 -->
      <section class="panel knowledge-panel">
        <h2>知识召回</h2>
        <div class="panel-content">
          <div class="input-group">
            <input type="text" id="recall-keywords" placeholder="输入关键词（逗号分隔）">
            <button id="recall-btn" class="btn btn-secondary">召回</button>
          </div>
          <div id="sku-list" class="sku-list"></div>
        </div>
      </section>
    </main>

    <!-- 底部：文档生成 -->
    <footer class="footer">
      <div class="actions">
        <button id="generate-memo-btn" class="btn btn-primary">生成备忘录</button>
        <button id="generate-battle-card-btn" class="btn btn-primary">生成作战卡</button>
        <button id="export-btn" class="btn btn-secondary">导出会话</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <button id="import-btn" class="btn btn-secondary">导入会话</button>
      </div>
      <div id="status-bar" class="status-bar">就绪</div>
    </footer>
  </div>

  <script src="/js/demo-mode.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
